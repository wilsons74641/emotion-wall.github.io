<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>情绪墙 — 敲碎你的负面情绪</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: "ZCOOL QingKe HuangYou", "PingFang SC", "Microsoft YaHei", "SimHei", cursive, sans-serif;
    -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;
    touch-action: manipulation; }
  #gameCanvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  /* UI Overlay */
  #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #ui-layer.active { pointer-events: auto; }
  #title-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0); transition: background 1.5s; }
  #title-overlay.show { background: rgba(0,0,0,0.55); }
  #title-text {
    color: #fff; font-size: clamp(20px, 5vw, 48px); font-weight: bold; text-align: center;
    opacity: 0; transform: scale(0.7); transition: all 1.5s cubic-bezier(0.34,1.56,0.64,1);
    text-shadow: 0 0 20px rgba(255,255,255,0.5); padding: 0 20px; line-height: 1.4; }
  #title-overlay.show #title-text { opacity: 1; transform: scale(1); }
  #subtitle-text {
    color: #e6cc7f; font-size: clamp(14px, 3.5vw, 28px); font-weight: bold; text-align: center;
    opacity: 0; transform: scale(0.8); transition: all 1.2s 0.5s cubic-bezier(0.34,1.56,0.64,1);
    margin-top: 16px; padding: 0 20px; text-shadow: 0 0 10px rgba(230,204,127,0.4); }
  #title-overlay.show #subtitle-text { opacity: 1; transform: scale(1); }
  /* Choice buttons */
  #choice-panel {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  #choice-panel.show { opacity: 1; pointer-events: auto; }
  #choice-congrats {
    color: #fff; font-size: clamp(18px, 4.5vw, 42px); font-weight: bold;
    margin-bottom: 40px; text-align: center; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
  .choice-btn {
    display: block; width: clamp(200px, 50vw, 400px); padding: 14px 0;
    margin: 8px 0; border: 2px solid rgba(255,255,255,0.5); border-radius: 12px;
    background: rgba(255,255,255,0.15); color: #fff; font-size: clamp(16px, 4vw, 32px);
    font-weight: bold; cursor: pointer; text-align: center; transition: all 0.2s;
    font-family: inherit; letter-spacing: 2px; }
  .choice-btn:hover, .choice-btn:active { background: rgba(255,255,255,0.35); border-color: #fff; transform: scale(1.03); }
  /* Instruction hint */
  #hint {
    position: absolute; bottom: 30px; width: 100%; text-align: center;
    color: rgba(255,255,255,0.3); font-size: 13px; transition: opacity 1s; pointer-events: none; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
  <div id="title-overlay">
    <div id="title-text"></div>
    <div id="subtitle-text"></div>
  </div>
  <div id="choice-panel">
    <div id="choice-congrats">恭喜你！击碎了所有负面情绪！</div>
    <button class="choice-btn" id="btn-continue">下一段旅途</button>
    <button class="choice-btn" id="btn-rest">休息一下</button>
  </div>
  <div id="hint">点击负面语句，击碎它们 ✦</div>
</div>

<script>
// ============================================================
//  情绪墙 (Emotion Wall) — Web 版
//  基于 Unity 项目还原 → HTML5 Canvas 单文件
// ============================================================

// ---------- 数据 ----------
const PHRASE_DATA_1 = {
  pairs: [
    { n:"我不够好",       p:"你已经足够好了",         c:"#ff6a9e" },
    { n:"没有人喜欢我",   p:"你是被爱的",             c:"#ff8f54" },
    { n:"我注定失败",     p:"每一次尝试都是成长",     c:"#ffd93d" },
    { n:"我太累了",       p:"休息是为了更好的出发",   c:"#6bcc78" },
    { n:"没人理解我",     p:"总有人愿意倾听",         c:"#4d96ff" },
    { n:"我做不到",       p:"你比你想象的更强大",     c:"#9b59b6" },
    { n:"一切都晚了",     p:"现在开始永远不晚",       c:"#1abd9b" },
    { n:"我不值得",       p:"你值得所有的美好",       c:"#e84c3d" },
    { n:"我害怕改变",     p:"改变带来新的可能",       c:"#f29c11" },
    { n:"我很孤独",       p:"你从来不是一个人",       c:"#3399db" }
  ]
};

const PHRASE_DATA_2 = {
  pairs: [
    { n:"我就是个废物",       p:"你拥有无限潜力",           c:"#ff6a9e" },
    { n:"活着好累",           p:"每一天都是新的开始",       c:"#ff8f54" },
    { n:"没有人会在乎我",     p:"你的存在本身就是意义",     c:"#ffd93d" },
    { n:"我永远不够好",       p:"你正在成为更好的自己",     c:"#6bcc78" },
    { n:"这个世界不需要我",   p:"世界因你而不同",           c:"#4d96ff" },
    { n:"我做什么都是错",     p:"犯错是成长的必经之路",     c:"#9b59b6" },
    { n:"没人能帮我",         p:"你比自己想象的更坚韧",     c:"#1abd9b" },
    { n:"一切都完了",         p:"每个终点都是新起点",       c:"#e84c3d" },
    { n:"我撑不下去了",       p:"你已经坚持了这么久",       c:"#f29c11" },
    { n:"我恨我自己",         p:"学会爱自己是终身浪漫",     c:"#3399db" },
    { n:"明天不会更好的",     p:"希望永远在前方等你",       c:"#d94080" },
    { n:"我只会拖累别人",     p:"你的努力值得被看见",       c:"#80d94d" },
    { n:"我的努力毫无意义",   p:"每一步都算数",             c:"#bf73d9" },
    { n:"没有人真正懂我",     p:"总有灵魂与你共鸣",         c:"#26bfbf" },
    { n:"我永远走不出去了",   p:"光就在前方等你迈出那一步", c:"#ffb233" }
  ]
};

const HEALING_MESSAGES = [
  "一切都会好起来的", "你是被深深爱着的", "今天的不开心就到此为止",
  "你已经做得很好了", "慢慢来，不着急", "这个世界需要你的光芒",
  "相信自己，你可以的", "深呼吸，放轻松", "每一个你都是珍贵的",
  "明天又是崭新的一天"
];

// ---------- 常量 ----------
const REF_W = 1024, REF_H = 768;
const MARGIN = 80;

// ---------- DOM 元素 ----------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiLayer = document.getElementById('ui-layer');
const titleOverlay = document.getElementById('title-overlay');
const titleText = document.getElementById('title-text');
const subtitleText = document.getElementById('subtitle-text');
const choicePanel = document.getElementById('choice-panel');
const hintEl = document.getElementById('hint');

// ---------- Canvas 尺寸适配 ----------
let scale = 1, offsetX = 0, offsetY = 0;
function resizeCanvas() {
  const w = window.innerWidth, h = window.innerHeight;
  const asp = REF_W / REF_H;
  if (w / h > asp) {
    // 宽屏：以高度为准
    scale = h / REF_H;
    offsetX = (w - REF_W * scale) / 2;
    offsetY = 0;
  } else {
    scale = w / REF_W;
    offsetX = 0;
    offsetY = (h - REF_H * scale) / 2;
  }
  canvas.width = w * devicePixelRatio;
  canvas.height = h * devicePixelRatio;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
resizeCanvas();

// ---------- 坐标转换 ----------
function screenToWorld(sx, sy) {
  return { x: (sx - offsetX) / scale, y: (sy - offsetY) / scale };
}

// ---------- 音效系统 ----------
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playGlassBreak() {
  if (!audioCtx) return;
  const duration = 0.35;
  const sampleRate = audioCtx.sampleRate;
  const length = Math.floor(sampleRate * duration);
  const buffer = audioCtx.createBuffer(1, length, sampleRate);
  const data = buffer.getChannelData(0);
  // 模拟玻璃碎裂：白噪声 + 快速衰减 + 高频增强
  for (let i = 0; i < length; i++) {
    const t = i / sampleRate;
    const env = Math.exp(-t * 12) * (1 - Math.exp(-t * 200));
    // 高频噪声 + 低频撞击
    const noise = (Math.random() * 2 - 1);
    const impact = Math.sin(t * 800 + Math.random() * 3) * Math.exp(-t * 40);
    data[i] = (noise * 0.6 + impact * 0.4) * env * 0.7;
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.8;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass'; filter.frequency.value = 2000;
  source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  source.start();
}

// ---------- 游戏状态 ----------
const Phase = { IDLE:0, INTERACTION:1, CLIMAX:2, RESET:3 };
let phase = Phase.IDLE;
let phrases = [];
let positivePhrases = [];
let particles = [];
let healingWords = [];
let shatteredCount = 0;
let lastHitTime = 0;
let firstHit = false;
let phraseSortOrder = 0;

// 关卡参数
let currentLevel = 0;
let phraseCount = 10;
let wanderForce = 15, maxSpeed = 80, fleeForce = 300, fleeDuration = 1.5;
let phraseFontSize = 36, positiveFontSize = 28;
let reinforceTriggers = [], reinforceCounts = [], reinforceIndex = 0;
let reinforceFrameImage = 0; // 0=default frame, 1=alt frame
let phraseData = PHRASE_DATA_1;

// 关卡配置
const LEVELS = [
  { phraseCount:10, wanderForce:15, maxSpeed:80, fleeForce:300, phraseSize:36, fleeDuration:1.5, data:PHRASE_DATA_1,
    reinforceTriggers:[], reinforceCounts:[], reinforceFrame:0 },
  { phraseCount:10, wanderForce:30, maxSpeed:160, fleeForce:500, phraseSize:32, fleeDuration:1.0, data:PHRASE_DATA_2,
    reinforceTriggers:[5,10], reinforceCounts:[5,5], reinforceFrame:1 },
];

// ---------- 颜色工具 ----------
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}
const HEALING_COLORS = [
  "#ff6a9e","#ff8f54","#ffd93d","#6bcc78","#4d96ff","#9b59b6","#1abd9b","#e84c3d"
];

// ---------- Phase 管理 ----------
function enterPhase(p) {
  phase = p;
  switch (p) {
    case Phase.IDLE: initIdle(); break;
    case Phase.CLIMAX: initClimax(); break;
    case Phase.RESET: initReset(); break;
  }
}

// ---------- IDLE：初始化短语 ----------
function initIdle() {
  clearAll();
  shatteredCount = 0;
  firstHit = false;
  phraseSortOrder = 0;
  reinforceIndex = 0;

  // 生成负面短语
  for (let i = 0; i < phraseCount; i++) {
    spawnNegative(i);
  }


  hintEl.style.opacity = '1';
}

function clearAll() {
  phrases = [];
  positivePhrases = [];
  particles = [];
  healingWords = [];
}

function spawnNegative(index, cascadePos = null) {
  const dataIdx = index % phraseData.pairs.length;
  const pair = phraseData.pairs[dataIdx];
  phraseSortOrder++;

  const pos = cascadePos || {
    x: MARGIN + Math.random() * (REF_W - MARGIN * 2),
    y: MARGIN + Math.random() * (REF_H - MARGIN * 2)
  };

  const vx = (Math.random() - 0.5) * 60;
  const vy = (Math.random() - 0.5) * 60;

  phrases.push({
    index, text: pair.n, positive: pair.p, positiveColor: pair.c,
    x: pos.x, y: pos.y, vx, vy,
    sortOrder: phraseSortOrder,
    shattered: false,
    frameType: 0, // default frame
    wanderTimer: 2 + Math.random() * 3,
    fleeCooldown: 0,
    opacity: 1
  });
}

// ---------- 眼睛和嘴巴 ----------
// ---------- 碰撞检测 ----------
function hitTest(phrase, wx, wy) {
  if (phrase.shattered) return false;
  // CJK 字符宽度约等于字体大小，加上留白
  const tw = phrase.text.length * phraseFontSize * 0.85 + 50;
  const th = phraseFontSize * 0.7 + 30;
  const left = phrase.x - tw / 2;
  const right = phrase.x + tw / 2;
  const top = phrase.y - th / 2;
  const bottom = phrase.y + th / 2;
  return wx >= left && wx <= right && wy >= top && wy <= bottom;
}

// ---------- 处理点击 ----------
function processHit(wx, wy) {
  if (phase !== Phase.IDLE && phase !== Phase.INTERACTION) return;
  if (performance.now() - lastHitTime < 50) return;
  initAudio();

  // 选最上层未碎短语
  let target = null, bestOrder = -Infinity;
  for (const p of phrases) {
    if (p.shattered) continue;
    if (hitTest(p, wx, wy) && p.sortOrder > bestOrder) {
      bestOrder = p.sortOrder;
      target = p;
    }
  }
  if (!target) return;

  // 首击进入 INTERACTION
  if (!firstHit) { firstHit = true; phase = Phase.INTERACTION; hintEl.style.opacity = '0'; }

  lastHitTime = performance.now();
  target.shattered = true;
  shatteredCount++;
  playGlassBreak();

  // 粒子
  spawnParticles(target.x, target.y, '#ffffff', 80);
  // 积极语句
  spawnPositive(target.x, target.y, target.positive, target.positiveColor);
  // 消除眼睛嘴巴

  // 推开周围短语
  for (const p of phrases) {
    if (p.shattered || p === target) continue;
    const dx = p.x - target.x, dy = p.y - target.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const force = fleeForce;
    p.vx += (dx / dist) * force * 0.5;
    p.vy += (dy / dist) * force * 0.5;
    p.fleeCooldown = fleeDuration;
  }

  // 波次增援
  if (reinforceIndex < reinforceTriggers.length && shatteredCount >= reinforceTriggers[reinforceIndex]) {
    const addCount = reinforceCounts[reinforceIndex];
    reinforceIndex++;
    spawnReinforcements(addCount);
  }

  // 全部击碎
  if (shatteredCount >= phraseCount) {
    setTimeout(() => handleAllShattered(), 2000);
  }
}

function spawnReinforcements(count) {
  const baseX = REF_W * 0.25, baseY = REF_H * 0.6;
  for (let i = 0; i < count; i++) {
    const pos = { x: baseX + i * 50, y: baseY - i * 40 };
    spawnNegative(phraseCount + i, pos);
    phraseSortOrder += 100;
    phrases[phrases.length - 1].sortOrder = phraseSortOrder;
    phrases[phrases.length - 1].frameType = reinforceFrameImage;
  }
  phraseCount += count;
}

function handleAllShattered() {
  // 屏幕闪光
  flashScreen();

  if (currentLevel >= LEVELS.length - 1) {
    // 最后一关 → 自动结算
    setTimeout(() => enterPhase(Phase.CLIMAX), 1500);
  } else {
    // 显示选择
    showChoice();
  }
}

// ---------- 粒子系统 ----------
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 100 + Math.random() * 350;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 2, maxLife: 2, size: 2 + Math.random() * 8, color,
      rotation: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 720
    });
  }
}

// ---------- 积极语句 ----------
function spawnPositive(x, y, text, color) {
  positivePhrases.push({
    x, y, text, color,
    opacity: 1, scale: 1,
    fadeIn: 1.2, elapsed: 0,
    bobOff: Math.random() * Math.PI * 2,
    swayOff: Math.random() * Math.PI * 2
  });
}

// ---------- 治愈话语 ----------
function initClimax() {
  uiLayer.classList.add('active');
  // 延迟依次生成治愈话语
  let i = 0;
  const spawnNext = () => {
    if (i >= HEALING_MESSAGES.length) {
      // 显示标题
      setTimeout(showTitle, Math.max(1000, 15000 - i * 400));
      return;
    }
    const msg = HEALING_MESSAGES[i];
    const color = HEALING_COLORS[i % HEALING_COLORS.length];
    const x = 120 + Math.random() * (REF_W - 240);
    const y = 80 + Math.random() * (REF_H - 280);
    healingWords.push({
      x, y, text: msg, color, fontSize: 90 + Math.random() * 40,
      opacity: 0, startY: y,
      bobOff: Math.random() * Math.PI * 2,
      driftDir: Math.random() > 0.5 ? 1 : -1,
      life: 25
    });
    i++;
    setTimeout(spawnNext, 400);
  };
  spawnNext();
}

function showTitle() {
  titleText.textContent = '敲碎你的负面情绪吧！';
  subtitleText.textContent = '';
  titleOverlay.classList.add('show');
  setTimeout(() => enterPhase(Phase.RESET), 12000);
}

function initReset() {
  titleOverlay.classList.remove('show');
  titleText.textContent = '';
  subtitleText.textContent = '';
  uiLayer.classList.remove('active');
  choicePanel.classList.remove('show');
  // 恢复第一关默认
  currentLevel = 0;
  phraseCount = 10; wanderForce = 15; maxSpeed = 80; fleeForce = 300; fleeDuration = 1.5;
  phraseFontSize = 36; positiveFontSize = 28;
  phraseData = PHRASE_DATA_1;
  reinforceTriggers = []; reinforceCounts = []; reinforceIndex = 0;
  reinforceFrameImage = 0;
  clearAll();
  // 黑屏过渡
  setTimeout(() => { enterPhase(Phase.IDLE); }, 2000);
}

// ---------- 屏幕闪光 ----------
let flashAlpha = 0;
function flashScreen() { flashAlpha = 0.9; }

// ---------- 选择UI ----------
function showChoice() {
  choicePanel.classList.add('show');
  uiLayer.classList.add('active');
}
function hideChoice() {
  choicePanel.classList.remove('show');
  uiLayer.classList.remove('active');
}

document.getElementById('btn-continue').addEventListener('click', () => {
  hideChoice();
  flashScreen();
  setTimeout(() => {
    currentLevel++;
    const cfg = LEVELS[currentLevel];
    phraseCount = cfg.phraseCount;
    wanderForce = cfg.wanderForce;
    maxSpeed = cfg.maxSpeed;
    fleeForce = cfg.fleeForce;
    phraseFontSize = cfg.phraseSize;
    fleeDuration = cfg.fleeDuration;
    phraseData = cfg.data;
    reinforceTriggers = cfg.reinforceTriggers;
    reinforceCounts = cfg.reinforceCounts;
    reinforceIndex = 0;
    reinforceFrameImage = cfg.reinforceFrame;
    enterPhase(Phase.IDLE);
  }, 1000);
});

document.getElementById('btn-rest').addEventListener('click', () => {
  hideChoice();
  flashScreen();
  currentLevel = 0;
  setTimeout(() => enterPhase(Phase.CLIMAX), 1500);
});

// ---------- 输入处理 ----------
function getEventPos(e) {
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const rect = canvas.getBoundingClientRect();
  return screenToWorld(clientX - rect.left, clientY - rect.top);
}

canvas.addEventListener('click', (e) => {
  const pos = getEventPos(e);
  processHit(pos.x, pos.y);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const pos = getEventPos(e);
  processHit(pos.x, pos.y);
}, { passive: false });

// 鼠标/手指位置跟踪（瞳孔跟随）
let pointerX = REF_W / 2, pointerY = REF_H / 2;
canvas.addEventListener('mousemove', (e) => {
  const pos = getEventPos(e);
  pointerX = pos.x; pointerY = pos.y;
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const pos = getEventPos(e);
  pointerX = pos.x; pointerY = pos.y;
}, { passive: false });

// ---------- Canvas 绘制函数 ----------
function drawRoundRect(x, y, w, h, r) {
  // 手绘抖动效果：基于位置生成确定性的"随机"偏移，每帧一致
  const seed = x * 7919 + y * 6271;
  const rng = (n) => { const s = Math.sin(seed + n * 12.9898) * 43758.5453; return s - Math.floor(s); };

  const hw = w / 2, hh = h / 2;
  const wobble = 1.8; // 抖动幅度

  // 画 2 遍重叠的路径，模拟手绘的不完美
  for (let pass = 0; pass < 2; pass++) {
    const ox = (rng(pass * 17) - 0.5) * 1.3;
    const oy = (rng(pass * 17 + 7) - 0.5) * 1.3;

    ctx.beginPath();

    // 上边
    for (let i = 0; i <= 6; i++) {
      const t = i / 6;
      const px = x - hw + r + t * (w - r * 2) + (rng(pass * 31 + i) - 0.5) * wobble;
      const py = y - hh + (rng(pass * 31 + i + 11) - 0.5) * wobble;
      if (i === 0) ctx.moveTo(px + ox, py + oy);
      else ctx.lineTo(px + ox, py + oy);
    }

    // 右上角
    for (let i = 0; i <= 3; i++) {
      const a = -Math.PI / 2 + (i / 3) * (Math.PI / 2);
      const cx = x + hw - r + Math.cos(a) * r + (rng(pass * 41 + i) - 0.5) * wobble;
      const cy = y - hh + r + Math.sin(a) * r + (rng(pass * 41 + i + 13) - 0.5) * wobble;
      ctx.lineTo(cx + ox, cy + oy);
    }

    // 右边
    for (let i = 0; i <= 6; i++) {
      const t = i / 6;
      const px = x + hw + (rng(pass * 45 + i) - 0.5) * wobble;
      const py = y - hh + r + t * (h - r * 2) + (rng(pass * 45 + i + 11) - 0.5) * wobble;
      ctx.lineTo(px + ox, py + oy);
    }

    // 右下角
    for (let i = 0; i <= 3; i++) {
      const a = 0 + (i / 3) * (Math.PI / 2);
      const cx = x + hw - r + Math.cos(a) * r + (rng(pass * 51 + i) - 0.5) * wobble;
      const cy = y + hh - r + Math.sin(a) * r + (rng(pass * 51 + i + 13) - 0.5) * wobble;
      ctx.lineTo(cx + ox, cy + oy);
    }

    // 下边
    for (let i = 0; i <= 6; i++) {
      const t = i / 6;
      const px = x + hw - r - t * (w - r * 2) + (rng(pass * 55 + i) - 0.5) * wobble;
      const py = y + hh + (rng(pass * 55 + i + 11) - 0.5) * wobble;
      ctx.lineTo(px + ox, py + oy);
    }

    // 左下角
    for (let i = 0; i <= 3; i++) {
      const a = Math.PI / 2 + (i / 3) * (Math.PI / 2);
      const cx = x - hw + r + Math.cos(a) * r + (rng(pass * 61 + i) - 0.5) * wobble;
      const cy = y + hh - r + Math.sin(a) * r + (rng(pass * 61 + i + 13) - 0.5) * wobble;
      ctx.lineTo(cx + ox, cy + oy);
    }

    // 左边
    for (let i = 0; i <= 6; i++) {
      const t = i / 6;
      const px = x - hw + (rng(pass * 65 + i) - 0.5) * wobble;
      const py = y + hh - r - t * (h - r * 2) + (rng(pass * 65 + i + 11) - 0.5) * wobble;
      ctx.lineTo(px + ox, py + oy);
    }

    // 左上角
    for (let i = 0; i <= 3; i++) {
      const a = Math.PI + (i / 3) * (Math.PI / 2);
      const cx = x - hw + r + Math.cos(a) * r + (rng(pass * 71 + i) - 0.5) * wobble;
      const cy = y - hh + r + Math.sin(a) * r + (rng(pass * 71 + i + 13) - 0.5) * wobble;
      ctx.lineTo(cx + ox, cy + oy);
    }

    ctx.closePath();
  }
}

function drawFrameBox(x, y, textW, textH, frameType) {
  const pw = textW + 60, ph = textH + 50;
  // 黑色背景
  ctx.fillStyle = 'rgba(0,0,0,0.92)';
  drawRoundRect(x, y, pw, ph, 12);
  ctx.fill();
  // 白框
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  drawRoundRect(x, y, pw, ph, 12);
  ctx.stroke();
  // 标题栏横线
  const lineColor = frameType === 0 ? '#ffffff' : '#ff4444';
  const lineWd = frameType === 0 ? 2 : 2.5;
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = lineWd;
  ctx.lineCap = 'round';
  // 手绘横线：分段绘制，每段略抖
  const lx1 = x - pw/2 + 12, lx2 = x + pw/2 - 12, ly = y - ph/2 + 30;
  const lseed = x * 3457 + y * 8761;
  const lrng = (n) => { const s = Math.sin(lseed + n * 45.67) * 43758.5453; return s - Math.floor(s); };
  for (let pass = 0; pass < 2; pass++) {
    const loy = (lrng(pass * 13) - 0.5) * 1.2;
    ctx.beginPath();
    for (let i = 0; i <= 8; i++) {
      const t = i / 8;
      const px = lx1 + t * (lx2 - lx1) + (lrng(pass * 23 + i) - 0.5) * 1.5;
      const py = ly + loy + (lrng(pass * 23 + i + 7) - 0.5) * 1.2;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
  ctx.lineCap = 'butt';

  // 标题栏装饰：左侧 ERROR，右侧 ✕
  const titleY = y - ph/2 + 16;
  ctx.fillStyle = lineColor;
  ctx.font = 'bold 12px "ZCOOL QingKe HuangYou","PingFang SC","Microsoft YaHei","SimHei",cursive,sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('ERROR', x - pw/2 + 14, titleY);
  ctx.textAlign = 'right';
  ctx.font = '14px "ZCOOL QingKe HuangYou","PingFang SC","Microsoft YaHei","SimHei",cursive,sans-serif';
  ctx.fillText('\u2715', x + pw/2 - 14, titleY);
}

// ---------- 游戏循环 ----------
let lastTime = performance.now();
let gameTime = 0;
function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  gameTime = now;

  update(dt, now);
  render(now);

  requestAnimationFrame(gameLoop);
}

function update(dt, now) {
  // 更新负面短语
  for (const p of phrases) {
    if (p.shattered) { p.opacity = Math.max(0, p.opacity - dt * 2); continue; }
    // 游走
    p.wanderTimer -= dt;
    if (p.wanderTimer <= 0) {
      p.wanderTimer = 2 + Math.random() * 3;
      p.vx += (Math.random() - 0.5) * wanderForce * 2;
      p.vy += (Math.random() - 0.5) * wanderForce * 2;
    }
    // 速度上限
    const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    if (spd > maxSpeed) { p.vx = p.vx / spd * maxSpeed; p.vy = p.vy / spd * maxSpeed; }
    // 阻力
    p.vx *= 0.985; p.vy *= 0.985;
    // flee 冷却
    if (p.fleeCooldown > 0) p.fleeCooldown -= dt;
    // 位置更新
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    // 边界反弹
    if (p.x < MARGIN) { p.x = MARGIN; p.vx = Math.abs(p.vx); }
    if (p.x > REF_W - MARGIN) { p.x = REF_W - MARGIN; p.vx = -Math.abs(p.vx); }
    if (p.y < MARGIN) { p.y = MARGIN; p.vy = Math.abs(p.vy); }
    if (p.y > REF_H - MARGIN) { p.y = REF_H - MARGIN; p.vy = -Math.abs(p.vy); }
  }

  // 更新粒子
  for (const pt of particles) {
    pt.life -= dt;
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.vx *= 0.97; pt.vy *= 0.97;
    pt.rotation += pt.rotSpeed * dt;
    pt.size *= 0.995;
  }
  particles = particles.filter(p => p.life > 0);

  // 更新积极语句
  for (const pp of positivePhrases) {
    pp.elapsed += dt;
    pp.opacity = Math.min(1, pp.elapsed / pp.fadeIn);
    // scale kept at initial value (1)
  }

  // 更新治愈话语
  for (const hw of healingWords) {
    hw.opacity = Math.min(1, hw.opacity + dt / 1.2);
    hw.life -= dt;
    const bob = Math.sin(now * 0.0004 + hw.bobOff) * 6;
    const drift = Math.sin(now * 0.00025 + hw.bobOff) * 15 * hw.driftDir;
    hw.x = hw.x + drift * dt;
    hw.y = hw.startY - (25 - hw.life) * 8 + bob;
    if (hw.life < 1.5) hw.opacity = Math.max(0, hw.life / 1.5);
  }
  healingWords = healingWords.filter(h => h.life > 0);


  // 闪光衰减
  if (flashAlpha > 0.001) flashAlpha *= Math.pow(0.01, dt);
  else flashAlpha = 0;
}

function render(now) {
  // 先清除整个画布（包括左右黑边区域），防止残影
  ctx.save();
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, canvas.width / devicePixelRatio, canvas.height / devicePixelRatio);
  ctx.restore();

  ctx.save();
  ctx.setTransform(devicePixelRatio * scale, 0, 0, devicePixelRatio * scale, offsetX * devicePixelRatio, offsetY * devicePixelRatio);

  // 背景
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, REF_W, REF_H);

  // 积极语句（在弹窗下面，先画）
  for (const pp of positivePhrases) {
    if (pp.opacity < 0.01) continue;
    ctx.save();
    ctx.globalAlpha = pp.opacity;
    // 浮动动画
    const bob = Math.sin(now * 0.0007 + pp.bobOff) * 8;
    const sway = Math.sin(now * 0.0005 + pp.swayOff) * 2;
    ctx.translate(pp.x + sway, pp.y + bob);
    ctx.rotate(sway * Math.PI / 180);
    ctx.scale(pp.scale, pp.scale);
    const rgb = hexToRgb(pp.color);
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},1)`;
    ctx.font = `${positiveFontSize}px "ZCOOL QingKe HuangYou","PingFang SC","Microsoft YaHei","SimHei",cursive,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(pp.text, 0, 0);
    ctx.restore();
  }

  // 负面短语（弹窗框 + 文字）
  for (const p of phrases) {
    if (p.opacity < 0.01) continue;
    ctx.save();
    ctx.globalAlpha = p.opacity;

    // 弹窗框（CJK字符宽度≈fontSize）
    const textW = p.text.length * phraseFontSize * 0.85;
    const textH = phraseFontSize * 0.65;
    drawFrameBox(p.x, p.y, textW, textH, p.frameType);

    // 文字
    ctx.fillStyle = '#ffffff';
    ctx.font = `${phraseFontSize}px "ZCOOL QingKe HuangYou","PingFang SC","Microsoft YaHei","SimHei",cursive,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.text, p.x, p.y + 15);

    ctx.restore();
  }

  // 粒子
  for (const pt of particles) {
    const alpha = Math.max(0, pt.life / pt.maxLife);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(pt.x, pt.y);
    ctx.rotate(pt.rotation * Math.PI / 180);
    ctx.fillStyle = pt.color;
    ctx.fillRect(-pt.size/2, -pt.size/2, pt.size, pt.size);
    ctx.restore();
  }

  // 治愈话语
  for (const hw of healingWords) {
    if (hw.opacity < 0.01) continue;
    ctx.save();
    ctx.globalAlpha = hw.opacity;
    ctx.fillStyle = hw.color;
    ctx.font = `${hw.fontSize}px "ZCOOL QingKe HuangYou","PingFang SC","Microsoft YaHei","SimHei",cursive,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(hw.text, hw.x, hw.y);
    ctx.restore();
  }

  // 闪光覆盖
  if (flashAlpha > 0.01) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0, 0, REF_W, REF_H);
  }

  ctx.restore();
}

// ---------- 启动 ----------
function init() {
  resizeCanvas();
  enterPhase(Phase.IDLE);
  requestAnimationFrame(gameLoop);
}

init();
console.log('🖤 情绪墙已就绪 — 点击负面语句，击碎它们吧！');
</script>
